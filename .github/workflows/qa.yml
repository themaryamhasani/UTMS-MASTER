name: UTMS QA

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate and build
        run: |
          npm run format:check
          npm run lint
          npm run architecture:check
          npm run typecheck
          npm run build
          npm run test:contract
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Start isolated test stack
        run: npm run test:stack:up && npm run test:stack:wait && npm run test:stack:seed
      - name: Run smoke and API suites
        run: |
          npm run test:smoke
          npm run test:integration
          npm run test:security
          npm run test:structural
      - name: Run browser suites
        run: |
          npm run test:e2e
          npm run test:system
          npm run test:accessibility
          npm run test:compatibility
      - name: Run bounded evidence suites
        run: |
          npm run test:performance
          npm run test:reliability
          npm run test:regression
          npm run test:uat
      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: utms-playwright-artifacts
          path: |
            artifacts/tests
            playwright-report
            test-results
            coverage
          if-no-files-found: ignore
      - name: Stop isolated test stack
        if: always()
        run: npm run test:stack:down

