name: utms-performance

services:
  postgres-performance:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: utms_perf
      POSTGRES_USER: utms_perf
      POSTGRES_PASSWORD: utms_perf
    ports:
      - "25432:5432"
    volumes:
      - utms-performance-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utms_perf -d utms_perf"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis-performance:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  performance-downstream:
    build:
      context: ../..
      dockerfile: infrastructure/docker/performance-downstream/Dockerfile
    ports:
      - "14180:4180"
    mem_limit: 128m
    cpus: 0.50
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4180/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 20

  api-performance:
    build:
      context: ../..
      dockerfile: infrastructure/docker/api/Dockerfile
    environment:
      NODE_ENV: performance
      API_CONSOLE_PORT: 4174
      API_CONSOLE_CORS_ORIGIN: http://web-performance:5173
      API_CONSOLE_DATA_DIR: /app/runtime/api-console
      DATABASE_URL: postgresql://utms_perf:utms_perf@postgres-performance:5432/utms_perf?schema=public
      REDIS_URL: redis://redis-performance:6379
    ports:
      - "24174:4174"
    volumes:
      - utms-performance-api-console:/app/runtime/api-console
    depends_on:
      postgres-performance:
        condition: service_healthy
      redis-performance:
        condition: service_healthy
      performance-downstream:
        condition: service_healthy
    mem_limit: 512m
    cpus: 1.00
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4174/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s

  web-performance:
    build:
      context: ../..
      dockerfile: infrastructure/docker/web/Dockerfile
    command: npm run dev -w @utms/web -- --host 0.0.0.0
    environment:
      NODE_ENV: performance
      VITE_API_CONSOLE_BASE_URL: /api/api-console
      VITE_DEV_API_PROXY_TARGET: http://api-performance:4174
    ports:
      - "25173:5173"
    depends_on:
      api-performance:
        condition: service_healthy
    mem_limit: 512m
    cpus: 1.00

  performance-runner:
    image: grafana/k6:0.54.0
    working_dir: /workspace
    environment:
      PERF_ENVIRONMENT: performance
      PERF_BASE_URL: http://api-performance:4174
      PERF_WEB_URL: http://web-performance:5173
      PERF_ALLOW_WRITES: "true"
      PERF_OUTPUT_DIR: /workspace/artifacts/performance/docker
    volumes:
      - ../..:/workspace
      - ../../artifacts/performance:/workspace/artifacts/performance
    depends_on:
      api-performance:
        condition: service_healthy
      web-performance:
        condition: service_started
    profiles: ["runner"]

volumes:
  utms-performance-postgres:
  utms-performance-api-console:
