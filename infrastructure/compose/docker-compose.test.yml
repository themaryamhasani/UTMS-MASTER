name: utms-qa

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: utms_test
      POSTGRES_USER: utms_test
      POSTGRES_PASSWORD: utms_test
    ports:
      - "15432:5432"
    volumes:
      - utms-qa-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utms_test -d utms_test"]
      interval: 2s
      timeout: 5s
      retries: 30

  redis-test:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "16379:6379"
    volumes:
      - utms-qa-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 30

  api-test:
    build:
      context: ../..
      dockerfile: infrastructure/docker/api/Dockerfile
    environment:
      NODE_ENV: test
      API_CONSOLE_PORT: 4174
      API_CONSOLE_CORS_ORIGIN: http://web-test:5173
      API_CONSOLE_DATA_DIR: /app/runtime/api-console
      DATABASE_URL: postgresql://utms_test:utms_test@postgres-test:5432/utms_test?schema=public
      REDIS_URL: redis://redis-test:6379
    ports:
      - "14174:4174"
    volumes:
      - utms-qa-api-console:/app/runtime/api-console
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    command: ["npm", "run", "dev:api"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4174/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  web-test:
    build:
      context: ../..
      dockerfile: infrastructure/docker/web/Dockerfile
    environment:
      NODE_ENV: test
      VITE_API_CONSOLE_BASE_URL: /api/api-console
      VITE_DEV_API_PROXY_TARGET: http://api-test:4174
    ports:
      - "15173:5173"
    depends_on:
      api-test:
        condition: service_healthy
    command: ["npm", "run", "dev", "-w", "@utms/web", "--", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:5173', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  qa-tests:
    image: mcr.microsoft.com/playwright:v1.55.0-noble
    working_dir: /workspace
    environment:
      CI: "1"
      NODE_ENV: test
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      UTMS_API_BASE_URL: http://api-test:4174
      UTMS_WEB_BASE_URL: http://web-test:5173
      UTMS_TEST_SEED: "20260715"
    volumes:
      - ../..:/workspace
      - utms-qa-node-modules:/workspace/node_modules
      - ../../artifacts/tests:/workspace/artifacts/tests
    depends_on:
      api-test:
        condition: service_healthy
      web-test:
        condition: service_healthy
    command: ["bash", "-lc", "npm ci --ignore-scripts && npm run test:all"]

volumes:
  utms-qa-postgres:
  utms-qa-redis:
  utms-qa-api-console:
  utms-qa-node-modules:
