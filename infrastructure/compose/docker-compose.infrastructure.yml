services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: utms
      POSTGRES_USER: utms
      POSTGRES_PASSWORD: utms
    ports:
      - "5432:5432"
    volumes:
      - utms-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  utms-postgres:
