name: utms

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-utms}
      POSTGRES_USER: ${POSTGRES_USER:-utms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-utms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - utms-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - utms-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_CONSOLE_PORT: 4174
      API_CONSOLE_CORS_ORIGIN: ${API_CONSOLE_CORS_ORIGIN:-http://localhost:5173}
      API_CONSOLE_DATA_DIR: /app/runtime/api-console
      DATABASE_URL: postgresql://${POSTGRES_USER:-utms}:${POSTGRES_PASSWORD:-utms}@postgres:5432/${POSTGRES_DB:-utms}?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "${API_CONSOLE_PORT:-4174}:4174"
    volumes:
      - utms-api-console:/app/runtime/api-console
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:4174/api/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web/Dockerfile
    command: npm run dev -w @utms/web -- --host 0.0.0.0
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_CONSOLE_BASE_URL: /api/api-console
      VITE_DEV_API_PROXY_TARGET: http://api:4174
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:5173', res => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  worker:
    profiles: ["jobs"]
    build:
      context: .
      dockerfile: infrastructure/docker/worker/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-utms}:${POSTGRES_PASSWORD:-utms}@postgres:5432/${POSTGRES_DB:-utms}?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  playwright-runner:
    profiles: ["runner"]
    build:
      context: .
      dockerfile: infrastructure/docker/playwright-runner/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      UTMS_API_BASE_URL: http://api:4174
    depends_on:
      api:
        condition: service_healthy

volumes:
  utms-postgres:
  utms-redis:
  utms-api-console:
